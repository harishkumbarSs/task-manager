name: task-manager

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/task-manager
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in repo-root .env — see docker-compose.env.example}
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
